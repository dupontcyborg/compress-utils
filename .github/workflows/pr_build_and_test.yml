name: Build and Test for PR

on:
  pull_request:
    types: [opened, synchronize]
    branches: [ "main" ]

# Least-privilege default for all jobs; jobs needing more override below.
permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        clean: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install Python Dependencies
      # zstandard/brotli/lz4 are the canonical references for the interop
      # suite (test_interop_py); without them those algorithms self-skip.
      run: pip install pybind11 pytest zstandard brotli lz4

    - name: Install codec CLIs for interop cross-check (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y zstd xz-utils lz4 bzip2 brotli

    - name: Install codec CLIs for interop cross-check (macOS)
      if: runner.os == 'macOS'
      # bzip2 ships with macOS; the rest come from Homebrew.
      run: brew install zstd xz lz4 brotli

    - name: Install codec CLIs for interop cross-check (Windows)
      if: runner.os == 'Windows'
      # Best-effort: the cross-check skips any tool that isn't on PATH, so a
      # partial install never fails the build — it just narrows coverage.
      continue-on-error: true
      run: choco install -y zstandard brotli lz4 xz

    - name: Configure CMake for All Language Bindings & All Compressors
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build All Languages
      run: cmake --build build --config Release -j 4

    - name: Install Bindings
      run: cmake --install build

    - name: Test All Bindings & Compressors
      run: |
        cd build
        ctest --output-on-failure -C Release