name: Build, Test and Package Python Wheels

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

# Least-privilege default for all jobs; jobs needing more override below.
permissions:
  contents: read

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-24.04-arm]
        python-version: ["cp310", "cp311", "cp312", "cp313", "cp314"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install cibuildwheel and build
        run: pip install cibuildwheel build

      - name: Copy Python Bindings Configuration
        run: cp bindings/python/pyproject.toml . && cp bindings/python/README.md .

      - name: Set Version from Tag for Wheels
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Setting exact version $VERSION for tag build"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Python Wheels
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BUILD: "${{ matrix.python-version }}-*"
          CIBW_ENVIRONMENT: "SETUPTOOLS_SCM_PRETEND_VERSION=${{ env.SETUPTOOLS_SCM_PRETEND_VERSION }}"
          CIBW_ARCHS_LINUX: "${{ contains(matrix.os, 'arm') && 'aarch64' || 'x86_64' }}"
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
        run: cibuildwheel --output-dir wheelhouse

      - name: Build Source Distribution (sdist)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == 'cp313'
        run: python -m build --sdist --outdir wheelhouse

      - name: Upload Wheels as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: wheelhouse/*.whl

      - name: Upload Source Distribution as GitHub Artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == 'cp313'
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: wheelhouse/*.tar.gz
          retention-days: 5

  # The cibuildwheel matrix above runs the Python-library interop channel
  # (test_interop.py) on every wheel. It cannot run the CLI cross-check:
  # cli_crosscheck.py lives outside bindings/python/tests, and the
  # cibuildwheel test environments (manylinux containers etc.) don't carry
  # the codec binaries. This job closes that gap on native runners so the
  # CLI channel — the one that mirrors how the legacy LZ4 wire-format bug
  # would have been caught — also runs on pushes to main (and tags), not
  # just in PRs.
  cli_interop:
    name: CLI interop cross-check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Copy Python binding configuration to repo root
        shell: bash
        run: cp bindings/python/pyproject.toml . && cp bindings/python/README.md .

      - name: Build & install the binding from source
        run: pip install .

      - name: Install codec CLIs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zstd xz-utils lz4 bzip2 brotli

      - name: Install codec CLIs (macOS)
        if: runner.os == 'macOS'
        # bzip2 ships with macOS; the rest come from Homebrew.
        run: brew install zstd xz lz4 brotli

      - name: Install codec CLIs (Windows)
        if: runner.os == 'Windows'
        # Best-effort: the cross-check skips any tool not on PATH, so a
        # partial install narrows coverage rather than failing the build.
        continue-on-error: true
        run: choco install -y zstandard brotli lz4 xz

      - name: Run CLI cross-check
        # compress_utils is now installed into site-packages, so no
        # PYTHONPATH is needed. Fails only on a genuine round-trip mismatch.
        run: python tests/interop/cli_crosscheck.py

  publish_to_pypi:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    environment: release
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare for Upload
        run: |
          mkdir -p wheelhouse
          find dist -type f -name "*.whl" -exec cp {} wheelhouse/ \;
          find dist -type f -name "*.tar.gz" -exec cp {} wheelhouse/ \; || echo "No source distribution found"
          ls -la wheelhouse/

      - name: Create Combined Archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}  # Strip the 'v' prefix if present
          echo "Creating archive for version $VERSION"
          zip -r compress-utils-python-${VERSION}.zip wheelhouse/
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            compress-utils-python-${{ env.RELEASE_VERSION }}.zip
          generate_release_notes: false
          fail_on_unmatched_files: false
          draft: false
          tag_name: ${{ github.ref_name }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/
          skip-existing: true
