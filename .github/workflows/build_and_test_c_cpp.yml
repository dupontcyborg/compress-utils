name: Build, Test and Package C/C++

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

# Least-privilege default for all jobs; jobs needing more override below.
permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Configure CMake (C + C++ bindings, Python off)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_PYTHON_BINDINGS=OFF

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Install (populates dist/c and dist/cpp)
        run: cmake --install build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Determine archive name
        id: archive
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   OS_TAG=linux ;;
            macOS)   OS_TAG=macos ;;
            Windows) OS_TAG=windows ;;
          esac
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF_NAME#v}
            NAME="compress-utils-${OS_TAG}-${VERSION}"
          else
            NAME="compress-utils-${OS_TAG}"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "os_tag=${OS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Package C + C++ bindings
        shell: bash
        run: |
          cd dist
          # Stage `c/` and `cpp/` under a versioned top-level dir so the
          # tarball extracts cleanly without polluting the user's cwd.
          STAGE="${{ steps.archive.outputs.name }}"
          mkdir -p "${STAGE}"
          cp -R c "${STAGE}/"
          cp -R cpp "${STAGE}/"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "Compress-Archive -Path '${STAGE}' -DestinationPath '${STAGE}.zip'"
          else
            tar -czf "${STAGE}.tar.gz" "${STAGE}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: |
            dist/${{ steps.archive.outputs.name }}.tar.gz
            dist/${{ steps.archive.outputs.name }}.zip
          if-no-files-found: error

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -la release/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: false
          fail_on_unmatched_files: true
          draft: false
          tag_name: ${{ github.ref_name }}
